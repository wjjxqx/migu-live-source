# Nginx 配置 - 咪咕视频PHP版
# 使用说明：
# 1. 将下面的 YOUR_PROJECT_PATH 替换为你的实际项目路径
# 2. 例如: root /var/www/html/migu;
# 3. 或者: root C:/xampp/htdocs/migu;

server {
    listen 3631;
    server_name _;
    
    # 网站根目录 - 修改为你的实际项目路径
    root YOUR_PROJECT_PATH;
    index index.php index.html;
    
    # 字符集
    charset utf-8;
    
    # 最大上传大小
    client_max_body_size 10M;
    
    # 主配置 - URL重写
    location / {
        # 如果请求的是真实文件或目录，直接访问
        try_files $uri $uri/ /index.php$is_args$args;
    }
    
    # PHP处理
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;  # 根据您的PHP-FPM配置修改
        # 或者使用socket: fastcgi_pass unix:/run/php/php8.0-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # 支持PATH_INFO - 关键配置
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        if ($fastcgi_path_info ~ ^(.+)$) {
            set $path_info $1;
        }
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param REQUEST_URI $request_uri;
        
        # 超时设置
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问data目录（外部访问）
    location ^~ /data/ {
        deny all;
        return 404;
    }
    
    # 禁止访问utils、backend、cron目录
    location ^~ /utils/ {
        deny all;
        return 404;
    }
    
    location ^~ /backend/ {
        deny all;
        return 404;
    }
    
    location ^~ /cron/ {
        deny all;
        return 404;
    }
    
    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # 安全头部
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 日志
    access_log /var/log/nginx/migu_access.log;
    error_log /var/log/nginx/migu_error.log;
}
