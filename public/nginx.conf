# Nginx 配置示例
# 使用说明：
# 1. 将所有的 YOUR_DOMAIN 替换为你的域名或IP
# 2. 将所有的 YOUR_PROJECT_PATH 替换为你的实际项目路径
# 3. 根据你的PHP-FPM配置修改 fastcgi_pass

server {
    listen 80;
    server_name YOUR_DOMAIN;  # 修改为你的域名或IP
    
    # 网站根目录 - 修改为你的实际项目路径
    root YOUR_PROJECT_PATH;
    index index.php index.html;
    
    # 字符集
    charset utf-8;
    
    # 日志
    access_log /var/log/nginx/migu_access.log;
    error_log /var/log/nginx/migu_error.log;
    
    # 主配置
    location / {
        try_files $uri $uri/ /core/index.php?$query_string;
    }
    
    # PHP处理
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.0-fpm.sock;  # 根据您的PHP-FPM配置修改
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # 超时设置
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问data目录
    location ^~ /data/ {
        deny all;
        return 404;
    }
    
    # 禁止访问utils、backend、cron目录
    location ^~ /utils/ {
        deny all;
        return 404;
    }
    
    location ^~ /backend/ {
        deny all;
        return 404;
    }
    
    location ^~ /cron/ {
        deny all;
        return 404;
    }
    
    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # 安全头部
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 禁止访问敏感文件
    location ~* (cron_update\.php|README\.md)$ {
        deny all;
    }
}

# HTTPS配置（推荐）
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;  # 修改为你的域名或IP
    
    # SSL证书 - 修改为你的实际证书路径
    ssl_certificate YOUR_SSL_CERT_PATH;
    ssl_certificate_key YOUR_SSL_KEY_PATH;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 其他配置同上
    root YOUR_PROJECT_PATH;
    index index.php index.html;
    charset utf-8;
    
    location / {
        try_files $uri $uri/ /core/index.php?$query_string;
    }
    
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.0-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    location ~ /\. {
        deny all;
    }
    
    location ^~ /data/ {
        deny all;
        return 404;
    }
    
    location ^~ /utils/ {
        deny all;
        return 404;
    }
    
    location ^~ /backend/ {
        deny all;
        return 404;
    }
    
    location ^~ /cron/ {
        deny all;
        return 404;
    }
}

# HTTP重定向到HTTPS（可选）
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$server_name$request_uri;
}
